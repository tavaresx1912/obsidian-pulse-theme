name: Release Plugin

on:
  push:
    branches: [main]
    paths:
      - 'plugin-src/**'

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extrair versão do plugin.xml
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<version>)[^<]+' plugin-src/META-INF/plugin.xml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Montar JAR
        run: |
          cd plugin-src
          python3 -c "
          import zipfile, os
          with zipfile.ZipFile('../ObsidianPulse.jar', 'w', zipfile.ZIP_DEFLATED) as jar:
              for root, dirs, files in os.walk('.'):
                  for file in files:
                      filepath = os.path.join(root, file)
                      jar.write(filepath, os.path.relpath(filepath, '.'))
          "

      - name: Montar ZIP de distribuição
        run: |
          mkdir -p dist/ObsidianPulse/lib
          cp ObsidianPulse.jar dist/ObsidianPulse/lib/
          cd dist
          python3 -c "
          import zipfile, os
          version = '${{ steps.version.outputs.version }}'
          with zipfile.ZipFile(f'ObsidianPulse-{version}.zip', 'w', zipfile.ZIP_DEFLATED) as z:
              for root, dirs, files in os.walk('ObsidianPulse'):
                  for file in files:
                      filepath = os.path.join(root, file)
                      z.write(filepath)
          "

      - name: Atualizar updatePlugins.xml
        run: |
          VERSION=${{ steps.version.outputs.version }}
          REPO=${{ github.repository }}
          cat > updatePlugins.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plugins>
            <plugin
              id="com.guilherme.obsidianpulse"
              url="https://github.com/${REPO}/releases/download/v${VERSION}/ObsidianPulse-${VERSION}.zip"
              version="${VERSION}">
              <idea-version since-build="231"/>
              <description>Tema dark para IDEs JetBrains — Obsidian Pulse.</description>
              <change-notes>${VERSION} — Release.</change-notes>
            </plugin>
          </plugins>
          EOF

      - name: Commit updatePlugins.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updatePlugins.xml
          git diff --staged --quiet || git commit -m "chore: atualiza updatePlugins.xml para v${{ steps.version.outputs.version }}"
          git push

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Obsidian Pulse v${{ steps.version.outputs.version }}
          files: dist/ObsidianPulse-${{ steps.version.outputs.version }}.zip

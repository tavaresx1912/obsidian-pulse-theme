name: Release Plugin

on:
  push:
    branches: [main]
    paths:
      - 'plugin-src/**'
      - 'updatePlugins.xml'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extrair versão do plugin.xml
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<version>)[^<]+' plugin-src/META-INF/plugin.xml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Montar JAR
        run: |
          cd plugin-src
          python3 -c "
          import zipfile, os
          with zipfile.ZipFile('../ObsidianPulse.jar', 'w', zipfile.ZIP_DEFLATED) as jar:
              for root, dirs, files in os.walk('.'):
                  for file in files:
                      filepath = os.path.join(root, file)
                      jar.write(filepath, os.path.relpath(filepath, '.'))
          "

      - name: Montar ZIP de distribuição
        run: |
          mkdir -p dist/ObsidianPulse/lib
          cp ObsidianPulse.jar dist/ObsidianPulse/lib/
          cd dist
          python3 -c "
          import zipfile, os
          with zipfile.ZipFile('ObsidianPulse-${{ steps.version.outputs.version }}.zip', 'w', zipfile.ZIP_DEFLATED) as z:
              for root, dirs, files in os.walk('ObsidianPulse'):
                  for file in files:
                      filepath = os.path.join(root, file)
                      z.write(filepath)
          "

      - name: Atualizar URL no updatePlugins.xml
        run: |
          sed -i "s|url=\"[^\"]*\"|url=\"https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/ObsidianPulse-${{ steps.version.outputs.version }}.zip\"|" updatePlugins.xml
          sed -i "s|version=\"[^\"]*\"|version=\"${{ steps.version.outputs.version }}\"|" updatePlugins.xml

      - name: Commit updatePlugins.xml atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updatePlugins.xml
          git diff --staged --quiet || git commit -m "chore: atualiza updatePlugins.xml para v${{ steps.version.outputs.version }}"
          git push

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Obsidian Pulse v${{ steps.version.outputs.version }}
          files: dist/ObsidianPulse-${{ steps.version.outputs.version }}.zip
